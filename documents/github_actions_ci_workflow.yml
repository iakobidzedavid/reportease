name: CI

on:
  push:
    branches: [main, 'entonomy/**']
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint
      
      - name: Run TypeScript type check
        run: npx tsc --noEmit
      
      - name: Build Next.js application
        run: npm run build
      
      - name: Check build artifacts
        run: |
          if [ ! -d ".next" ]; then
            echo "❌ Build failed: .next directory not created"
            exit 1
          fi
          echo "✅ Build succeeded: .next directory present"
      
      - name: Verify build output
        run: |
          echo "Build output verification:"
          ls -la .next/ | head -10
          echo "TypeScript check completed"

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Type check
        run: npx tsc --noEmit --skipLibCheck

  build-verification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build for production
        run: npm run build
      
      - name: Check for build errors
        run: |
          if [ $? -ne 0 ]; then
            echo "❌ Production build failed"
            exit 1
          fi
          echo "✅ Production build successful"

  upload-build-artifacts:
    runs-on: ubuntu-latest
    needs: [lint-and-build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
      
      - name: Upload .next artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next
          retention-days: 7
      
      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: build-package
          path: |
            package.json
            package-lock.json
            next.config.ts
            tsconfig.json
          retention-days: 7
